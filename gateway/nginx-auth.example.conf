# Contoh: hostname terpisah untuk Zitadel (VM2) lewat gateway (VM3).
# Sesuaikan server_name, upstream IP:port VM2, dan path sertifikat setelah certbot.
#
# Letakkan sebagai site terpisah dari app (jangan gabung location / dengan frontend).
# Upstream = Traefik di VM2 = PROXY_HTTP_PUBLISHED_PORT ke container :80

server {
    listen 80;
    server_name auth.example.com;

    location / {
        proxy_pass http://10.184.131.67:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Setelah Certbot, biasanya akan ada blok listen 443 ssl; pastikan proxy_set_header sama
# dan $scheme = https untuk user.
