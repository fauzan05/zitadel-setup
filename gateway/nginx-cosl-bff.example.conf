# COSL: Nuxt BFF + Go API — contoh untuk default.conf / site-enabled.
#
# Poin penting:
# - Browser memanggil /api/* ke Nuxt (BFF), termasuk WebSocket /api/notifications/ws.
# - Jangan arahkan /api/ ke Go (:8000) bila WS notifikasi dipakai; handler WS ada di Nitro (:3000).
# - Untuk WebSocket: pakai map + Connection $connection_upgrade (lebih aman daripada Connection "upgrade" untuk semua request).
#
# === Potongan untuk http { } di nginx.conf (satu kali): ===
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }

server {
    listen 80;
    server_name 10.184.131.68;

    # Ganti dengan IP:port VM/container Nuxt dan Go sesuai deploy Anda
    set $nuxt_upstream 10.184.131.60:3000;
    set $go_upstream   10.184.131.60:8000;

    # Semua BFF + cookie + WS notifikasi lewat Nuxt
    location /api/ {
        proxy_pass http://$nuxt_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        # Tanpa `map` di http {}: gunakan "upgrade". Jika sudah ada map $connection_upgrade, ganti baris di bawah jadi: Connection $connection_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Contoh: OIDC/callback langsung ke Go (sesuaikan dengan routing Anda)
    # location /api/oidc/ {
    #     proxy_pass http://$go_upstream;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    location / {
        proxy_pass http://$nuxt_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
